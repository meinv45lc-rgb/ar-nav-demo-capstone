<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AR Station Navigator</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    /* ─────────────────────────────────────────────
       Design Tokens (from theme v2.css + AR extensions)
    ───────────────────────────────────────────── */
    :root {
      /* Color — from theme v2 */
      --color-primary: #2f49d1;
      --color-primary-pressed: #263cb0;
      --color-primary-disabled: #8ea0ee;
      --color-secondary: #66aeb5;
      --color-accent: #1eb6e8;
      --color-success: #55b949;
      --color-warning: #f2b93b;
      --color-error: #d9534f;

      /* Typography */
      --font-family-base: "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --font-family-heading: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --font-size-overline: 11px;
      --font-size-caption: 12px;
      --font-size-body-small: 13px;
      --font-size-body: 15px;
      --font-size-h3: 24px;
      --font-size-h2: 28px;
      --font-size-h1: 32px;
      --font-weight-regular: 400;
      --font-weight-medium: 500;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      /* Radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;

      /* Motion */
      --motion-duration-micro: 120ms;
      --motion-duration-normal: 220ms;
      --motion-duration-macro: 320ms;
      --motion-easing-standard: ease-out;

      /* AR Demo Extensions */
      --color-arrived: #4CAF50;
      --color-cam-bg-1: #1a1a2e;
      --color-cam-bg-2: #16213e;
      --color-cam-bg-3: #0f3460;
      --color-map-bg: #0d1b2a;
      --color-map-corridor: rgba(255,255,255,0.18);
      --color-map-route: #00e5ff;
      --color-map-dot: #2f49d1;
      --color-map-exit: #ff5252;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: 1px solid rgba(255, 255, 255, 0.18);
      --glass-blur: blur(16px);
      --arrow-size: 120px;
      --app-max-width: 430px;
    }

    /* ─────────────────────────────────────────────
       Base Reset
    ───────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-family-base);
      background: #000;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .hidden { display: none !important; }

    button { font-family: var(--font-family-base); }

    .material-symbols-outlined {
      font-family: "Material Symbols Outlined";
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      display: inline-block;
      vertical-align: middle;
      user-select: none;
    }

    /* ─────────────────────────────────────────────
       Shared Screen Base
    ───────────────────────────────────────────── */
    #screen-start,
    #screen-nav {
      position: relative;
      width: 100%;
      max-width: var(--app-max-width);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────
       SCREEN 1 — Start
    ───────────────────────────────────────────── */
    #screen-start {
      background: linear-gradient(160deg,
        var(--color-cam-bg-1) 0%,
        var(--color-cam-bg-2) 55%,
        var(--color-cam-bg-3) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      gap: var(--space-8);
    }

    /* Header */
    .start-header {
      text-align: center;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .start-header__icon {
      font-size: 52px;
      color: #7eb3ff;
      margin-bottom: var(--space-2);
    }

    .start-header__title {
      font-family: var(--font-family-heading);
      font-size: var(--font-size-h2);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .start-header__sub {
      font-size: var(--font-size-body-small);
      color: rgba(255, 255, 255, 0.55);
    }

    /* Card */
    .start-card {
      width: 100%;
      background: var(--glass-bg);
      border: var(--glass-border);
      border-radius: 20px;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    /* Field group */
    .field-group { display: flex; flex-direction: column; }

    .field-label {
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-medium);
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-2);
    }

    /* Select */
    .select-wrap { position: relative; }

    .field-select {
      width: 100%;
      padding: 12px var(--space-4);
      padding-right: 36px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: var(--font-size-body);
      font-family: var(--font-family-base);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .field-select option { background: #1a1a2e; color: #fff; }

    .field-select:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(47, 73, 209, 0.6);
    }

    .select-caret {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.55);
      pointer-events: none;
      font-size: 20px;
    }

    /* Exit pills */
    .exit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .exit-pill {
      padding: 13px var(--space-4);
      border-radius: var(--radius-pill);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.8);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition:
        background var(--motion-duration-normal) var(--motion-easing-standard),
        border-color var(--motion-duration-normal) var(--motion-easing-standard),
        color var(--motion-duration-normal) var(--motion-easing-standard),
        box-shadow var(--motion-duration-normal) var(--motion-easing-standard);
    }

    .exit-pill.selected {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
      box-shadow: 0 4px 18px rgba(47, 73, 209, 0.45);
    }

    .exit-pill:active { opacity: 0.72; }

    /* Exit description */
    .exit-desc {
      font-size: var(--font-size-body-small);
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      min-height: 18px;
      transition: opacity var(--motion-duration-normal) ease;
    }

    /* Primary CTA */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      padding: 16px var(--space-6);
      border-radius: var(--radius-pill);
      border: none;
      background: var(--color-primary);
      color: #fff;
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition:
        background var(--motion-duration-normal) var(--motion-easing-standard),
        opacity var(--motion-duration-normal) var(--motion-easing-standard);
    }

    .btn-primary:disabled {
      background: var(--color-primary-disabled);
      cursor: not-allowed;
      opacity: 0.55;
    }

    .btn-primary:not(:disabled):active { background: var(--color-primary-pressed); }

    /* ─────────────────────────────────────────────
       SCREEN 2 — Navigation
    ───────────────────────────────────────────── */
    #screen-nav { background: #000; }

    /* Plain dark background when camera unavailable */
    #screen-nav { background: #111; }

    /* AR Overlay */
    .ar-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .ar-overlay > * { pointer-events: auto; }

    /* Top bar */
    .nav-top {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      padding-top: max(var(--space-3), env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
    }

    .nav-btn-back {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-pill);
      border: 1.5px solid rgba(255, 255, 255, 0.45);
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background var(--motion-duration-micro) ease;
    }

    .nav-btn-back:active { background: rgba(0,0,0,0.6); }

    .nav-dest-pill {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 9px var(--space-4);
      border-radius: var(--radius-pill);
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
    }

    .nav-dest-pill .material-symbols-outlined { font-size: 18px; color: #7eb3ff; flex-shrink: 0; }
    .nav-dest-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Central AR area */
    .ar-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-6);
      pointer-events: none;
    }

    /* Distance badge */
    .distance-badge {
      padding: 7px 18px;
      border-radius: var(--radius-pill);
      background: var(--glass-bg);
      border: var(--glass-border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: #fff;
      font-size: var(--font-size-body-small);
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: opacity 300ms ease-out;
    }

    /* Arrow wrapper — CSS transition for direction changes */
    .arrow-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 150ms ease-out;
      width: var(--arrow-size);
      height: calc(var(--arrow-size) * 1.25);
    }

    .arrow-wrap.fading { opacity: 0; }

    /* SVG arrow */
    .nav-arrow {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.7));
    }

    /* Arrived — checkmark circle state */
    .arrived-icon {
      font-size: 96px;
      color: var(--color-arrived);
      filter: drop-shadow(0 0 24px rgba(76, 175, 80, 0.6));
      animation: arrivedPop 400ms var(--motion-easing-standard);
    }

    /* Step indicator */
    .step-indicator {
      font-size: var(--font-size-caption);
      color: rgba(255, 255, 255, 0.6);
      font-weight: var(--font-weight-medium);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Reassurance pill */
    .reassurance-pill {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      background: var(--glass-bg);
      border: var(--glass-border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: rgba(255, 255, 255, 0.85);
      font-size: var(--font-size-body-small);
      transition: opacity 300ms ease-out;
    }

    .reassurance-pill .material-symbols-outlined {
      font-size: 16px;
      color: #4ade80;
      flex-shrink: 0;
    }

    .reassurance-pill.fading { opacity: 0; }

    /* Mini map */
    .minimap-wrap {
      position: absolute;
      bottom: 160px;
      left: var(--space-4);
      width: 160px;
      height: 130px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    .minimap-svg {
      width: 100%;
      height: 100%;
      background: var(--color-map-bg);
      display: block;
    }

    /* Bottom glassmorphic panel */
    .bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--glass-bg);
      border: var(--glass-border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      padding: var(--space-4) var(--space-6);
      padding-bottom: max(var(--space-6), env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-pill);
      transition: width 350ms var(--motion-easing-standard);
      width: 25%;
    }

    /* Instruction */
    .instruction-text {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .instruction-hint {
      font-size: var(--font-size-body-small);
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    /* Next Step button */
    .btn-next {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      padding: 15px var(--space-6);
      border-radius: var(--radius-pill);
      border: none;
      background: var(--color-primary);
      color: #fff;
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition:
        background var(--motion-duration-normal) var(--motion-easing-standard),
        transform var(--motion-duration-micro) var(--motion-easing-standard);
    }

    .btn-next:active { transform: scale(0.97); }
    .btn-next:disabled {
      background: var(--color-arrived);
      cursor: default;
      transform: none;
    }

    /* ─────────────────────────────────────────────
       Animations
    ───────────────────────────────────────────── */
    @keyframes mapPulse {
      0%   { r: 6;  opacity: 0.9; }
      70%  { r: 13; opacity: 0; }
      100% { r: 6;  opacity: 0; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes arrivedPop {
      0%   { transform: scale(0.6); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes arrowBob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    /* Entry animations when nav screen appears */
    .nav-entry .bottom-panel { animation: slideUp 320ms ease-out; }
    .nav-entry .ar-center    { animation: slideUp 260ms ease-out; }
    .nav-entry .minimap-wrap { animation: slideUp 300ms ease-out; }

    /* Arrow bob when direction is straight */
    .arrow-straight { animation: arrowBob 2s ease-in-out infinite; }

    /* SVG pulse element */
    .map-pulse { animation: mapPulse 1.8s ease-out infinite; }

    /* Real camera video */
    #cam-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 400ms ease;
    }

    /* Camera denied banner */
    .cam-error {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: rgba(217,83,79,0.85);
      color: #fff;
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-medium);
      white-space: nowrap;
      pointer-events: none;
      z-index: 20;
    }
    .cam-error .material-symbols-outlined { font-size: 15px; }
  </style>
</head>
<body>

  <!-- ══ SCREEN 1: START ══════════════════════════════════════ -->
  <div id="screen-start">

    <header class="start-header">
      <span class="material-symbols-outlined start-header__icon">subway</span>
      <h1 class="start-header__title">AR Station Navigator</h1>
      <p class="start-header__sub">Select your destination exit to begin</p>
    </header>

    <div class="start-card">

      <!-- Station selector -->
      <div class="field-group">
        <label class="field-label" for="station-select">Station</label>
        <div class="select-wrap">
          <select id="station-select" class="field-select">
            <option value="central">Central Station</option>
            <option value="midtown">Midtown Plaza</option>
            <option value="harbor">Harbor Terminal</option>
          </select>
          <span class="material-symbols-outlined select-caret">expand_more</span>
        </div>
      </div>

      <!-- Exit buttons -->
      <div class="field-group">
        <label class="field-label">Select Exit</label>
        <div class="exit-grid" id="exit-grid">
          <button class="exit-pill" data-exit="A">Exit A</button>
          <button class="exit-pill" data-exit="B">Exit B</button>
          <button class="exit-pill" data-exit="C">Exit C</button>
          <button class="exit-pill" data-exit="D">Exit D</button>
        </div>
      </div>

      <!-- Exit meta description -->
      <div class="exit-desc" id="exit-desc">&nbsp;</div>

      <!-- CTA -->
      <button class="btn-primary" id="btn-start" disabled>
        <span class="material-symbols-outlined">near_me</span>
        Start Navigation
      </button>

    </div>

  </div>


  <!-- ══ SCREEN 2: NAVIGATION ══════════════════════════════════ -->
  <div id="screen-nav" class="hidden">

    <!-- Real camera feed -->
    <video id="cam-video" autoplay playsinline muted></video>

    <!-- Camera denied banner (hidden by default) -->
    <div class="cam-error hidden" id="cam-error">
      <span class="material-symbols-outlined">no_photography</span>
      Camera access denied
    </div>

    <!-- AR overlay layer -->
    <div class="ar-overlay" id="ar-overlay">

      <!-- Top bar -->
      <nav class="nav-top">
        <button class="nav-btn-back" id="btn-back" aria-label="Go back">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="nav-dest-pill">
          <span class="material-symbols-outlined">location_pin</span>
          <span class="nav-dest-text" id="nav-dest-text">Exit B — Central Station</span>
        </div>
      </nav>

      <!-- Central AR elements -->
      <div class="ar-center" id="ar-center">

        <!-- Distance badge -->
        <div class="distance-badge" id="distance-badge">~20 ft to Exit B</div>

        <!-- Direction arrow wrapper (transition applied here) -->
        <div class="arrow-wrap" id="arrow-wrap">
          <!-- SVG arrow (default: pointing up = straight) -->
          <svg id="nav-arrow" class="nav-arrow" viewBox="0 0 80 100"
               xmlns="http://www.w3.org/2000/svg" aria-label="Direction arrow">
            <path d="M40 95 L40 30" stroke="white" stroke-width="9"
                  stroke-linecap="round" fill="none"/>
            <polygon points="40,5 20,35 60,35" fill="white"/>
          </svg>
        </div>

        <!-- Step counter -->
        <div class="step-indicator" id="step-indicator">Step 1 of 4</div>

        <!-- Reassurance pill -->
        <div class="reassurance-pill" id="reassurance-pill">
          <span class="material-symbols-outlined">check_circle</span>
          <span id="reassurance-text">You are on the right path</span>
        </div>

      </div>

      <!-- Mini map (bottom-left) -->
      <div class="minimap-wrap" id="minimap-wrap">
        <svg id="minimap" class="minimap-svg"
             viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg"
             aria-label="Mini map"></svg>
      </div>

      <!-- Bottom control panel -->
      <div class="bottom-panel" id="bottom-panel">

        <!-- Step progress bar -->
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <!-- Instruction text -->
        <div>
          <p class="instruction-text" id="instruction-text">Head straight through the main hall</p>
          <p class="instruction-hint" id="instruction-hint">Follow the blue line on the floor</p>
        </div>

        <!-- Next Step button -->
        <button class="btn-next" id="btn-next">
          <span class="material-symbols-outlined">arrow_forward</span>
          <span id="btn-next-label">Next Step</span>
        </button>

      </div>

    </div>

  </div>


  <script>
    'use strict';

    /* ─────────────────────────────────────────────
       Data
    ───────────────────────────────────────────── */
    const stations = {
      central: 'Central Station',
      midtown: 'Midtown Plaza',
      harbor:  'Harbor Terminal',
    };

    const exitMeta = {
      A: 'Street Level · Elevator Available · Bus Stop Nearby',
      B: 'Underground · Nearest to Platform 1 · Accessible Gate',
      C: 'Street Level · Bus Stop Outside · Shops Inside',
      D: 'Accessible Route · Elevator + Ramp · Drop-off Zone',
    };

    const routes = {
      A: [
        { instruction: 'Head straight through the main hall',
          direction: 'straight', distance: '45 ft', hint: 'Follow the blue line on the floor' },
        { instruction: 'Turn left at the escalator',
          direction: 'left',     distance: '28 ft', hint: 'Escalator is on your right' },
        { instruction: 'Continue forward past the ticket gate',
          direction: 'straight', distance: '14 ft', hint: 'Keep your ticket ready' },
        { instruction: "You've arrived at Exit A",
          direction: 'arrived',  distance: '0 ft',  hint: 'Exit to street level' },
      ],
      B: [
        { instruction: 'Walk toward the south corridor',
          direction: 'straight', distance: '35 ft', hint: 'Overhead signs point to Exit B' },
        { instruction: 'Turn right at the stairwell',
          direction: 'right',    distance: '22 ft', hint: 'Stay level — do not take the stairs' },
        { instruction: 'Pass through the fare gate',
          direction: 'straight', distance: '18 ft', hint: 'Tap your card on the reader' },
        { instruction: "You've arrived at Exit B",
          direction: 'arrived',  distance: '0 ft',  hint: 'Platform 1 is directly above' },
      ],
      C: [
        { instruction: 'Head to the central concourse',
          direction: 'straight', distance: '48 ft', hint: 'Large open area ahead' },
        { instruction: 'Bear right toward the food court',
          direction: 'right',    distance: '38 ft', hint: 'Follow Exit C overhead signs' },
        { instruction: 'Turn left at the information kiosk',
          direction: 'left',     distance: '20 ft', hint: 'Blue kiosk on your right side' },
        { instruction: 'Walk down the corridor',
          direction: 'straight', distance: '12 ft', hint: 'Natural light visible ahead' },
        { instruction: "You've arrived at Exit C",
          direction: 'arrived',  distance: '0 ft',  hint: 'Bus stop is immediately outside' },
      ],
      D: [
        { instruction: 'Take the accessible route — follow the yellow strip',
          direction: 'straight', distance: '30 ft', hint: 'Ramp on the left side ahead' },
        { instruction: 'Turn right at the elevator lobby',
          direction: 'right',    distance: '24 ft', hint: 'Elevator bank on your right' },
        { instruction: 'Proceed through the wide accessible gate',
          direction: 'straight', distance: '20 ft', hint: 'Wide gate — wheelchair friendly' },
        { instruction: 'Continue to the ramp',
          direction: 'straight', distance: '10 ft', hint: 'Gentle slope ahead' },
        { instruction: "You've arrived at Exit D",
          direction: 'arrived',  distance: '0 ft',  hint: 'Accessible drop-off zone outside' },
      ],
    };

    // Direction → rotation degrees (applied to arrow SVG via CSS transform)
    const directionDeg = { straight: 0, left: -90, right: 90, arrived: 0 };

    // Reassurance messages
    const reassuranceMessages = [
  () => 'You are on the right path',
  () => {
    if (!state.exit) return '';
    return `~${Math.max(1, routes[state.exit].length - state.stepIndex - 1)} min to Exit ${state.exit}`;
  },
  () => 'Accessible route available',
  () => 'Stay on the highlighted path',
];

    /* ─────────────────────────────────────────────
       Mini Map Data
    ───────────────────────────────────────────── */
    // SVG viewBox: 0 0 200 160
    const corridors = [
      [20, 80, 180, 80],   // Main horizontal corridor
      [100, 20, 100, 140], // Central vertical corridor
      [20, 40, 100, 40],   // NW wing
      [100, 120, 180, 120],// SE wing
    ];

    const exitPoints = {
      A: { x: 20,  y: 40  },
      B: { x: 180, y: 80  },
      C: { x: 180, y: 120 },
      D: { x: 100, y: 140 },
    };

    const exitLabels = {
      A: { x: 8,   y: 36  },
      B: { x: 185, y: 76  },
      C: { x: 185, y: 116 },
      D: { x: 96,  y: 155 },
    };

    // Discrete dot positions (one per step, per exit), from centre outward
    const dotPositions = {
      A: [ {x:100,y:80}, {x:65,y:80}, {x:40,y:60}, {x:20,y:40} ],
      B: [ {x:100,y:80}, {x:130,y:80}, {x:158,y:80}, {x:180,y:80} ],
      C: [ {x:100,y:80}, {x:128,y:80}, {x:148,y:98}, {x:162,y:112}, {x:180,y:120} ],
      D: [ {x:100,y:80}, {x:100,y:98}, {x:100,y:112}, {x:100,y:126}, {x:100,y:140} ],
    };

    /* ─────────────────────────────────────────────
       State
    ───────────────────────────────────────────── */
    const state = {
      screen: 'start',
      station: 'central',
      exit: null,
      stepIndex: 0,
      reassuranceTimer: null,
      reassuranceIndex: 0,
      currentDeg: 0,
      cameraStream: null,
    };

    /* ─────────────────────────────────────────────
       Element refs
    ───────────────────────────────────────────── */
    const el = {
      screenStart:      document.getElementById('screen-start'),
      screenNav:        document.getElementById('screen-nav'),
      stationSelect:    document.getElementById('station-select'),
      exitGrid:         document.getElementById('exit-grid'),
      exitDesc:         document.getElementById('exit-desc'),
      btnStart:         document.getElementById('btn-start'),
      btnBack:          document.getElementById('btn-back'),
      btnNext:          document.getElementById('btn-next'),
      btnNextLabel:     document.getElementById('btn-next-label'),
      navDestText:      document.getElementById('nav-dest-text'),
      arCenter:         document.getElementById('ar-center'),
      distanceBadge:    document.getElementById('distance-badge'),
      arrowWrap:        document.getElementById('arrow-wrap'),
      navArrow:         document.getElementById('nav-arrow'),
      stepIndicator:    document.getElementById('step-indicator'),
      reassurancePill:  document.getElementById('reassurance-pill'),
      reassuranceText:  document.getElementById('reassurance-text'),
      minimap:          document.getElementById('minimap'),
      progressFill:     document.getElementById('progress-fill'),
      instructionText:  document.getElementById('instruction-text'),
      instructionHint:  document.getElementById('instruction-hint'),
      camVideo:         document.getElementById('cam-video'),
      camError:         document.getElementById('cam-error'),
    };

    /* ─────────────────────────────────────────────
       Start Screen Logic
    ───────────────────────────────────────────── */
    function selectExit(key) {
      state.exit = key;
      document.querySelectorAll('.exit-pill').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.exit === key);
      });
      el.exitDesc.textContent = exitMeta[key];
      el.btnStart.disabled = false;
    }

    /* ─────────────────────────────────────────────
       Navigation Logic
    ───────────────────────────────────────────── */
    /* ─────────────────────────────────────────────
       Camera
    ───────────────────────────────────────────── */
    function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        el.camError.classList.remove('hidden');
        return;
      }

      function applyStream(stream) {
        state.cameraStream = stream;
        el.camVideo.srcObject = stream;
        el.camVideo.play().catch(() => {});
        el.camVideo.style.opacity = '1';
        el.camError.classList.add('hidden');
      }

      // 1st attempt: force exact back camera
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'environment' } },
        audio: false,
      })
      .then(applyStream)
      .catch(() => {
        // 2nd attempt: prefer back camera but allow fallback (works on desktop)
        navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false,
        })
        .then(applyStream)
        .catch(() => {
          el.camError.classList.remove('hidden');
        });
      });
    }

    function stopCamera() {
      if (state.cameraStream) {
        state.cameraStream.getTracks().forEach(t => t.stop());
        state.cameraStream = null;
      }
      el.camVideo.srcObject = null;
      el.camVideo.style.opacity = '0';
      el.camError.classList.add('hidden');
    }

    function startNavigation() {
      state.stepIndex = 0;
      state.reassuranceIndex = 0;
      state.currentDeg = 0;
      state.screen = 'nav';

      el.screenStart.classList.add('hidden');
      el.screenNav.classList.remove('hidden');
      el.screenNav.classList.add('nav-entry');
      setTimeout(() => el.screenNav.classList.remove('nav-entry'), 350);

      startCamera();
      updateUI();
      updateMiniMap();
      startReassuranceCycle();
    }

    function nextStep() {
      const steps = routes[state.exit];
      if (state.stepIndex < steps.length - 1) {
        state.stepIndex++;
        updateUI();
        updateMiniMap();
        if (state.stepIndex === steps.length - 1) {
          handleArrived();
        }
      }
    }

    function handleArrived() {
      clearInterval(state.reassuranceTimer);

      // Show arrived state in arrow area
      el.arrowWrap.innerHTML = `<span class="material-symbols-outlined arrived-icon">check_circle</span>`;
      el.arrowWrap.classList.remove('arrow-straight', 'fading');
      el.arrowWrap.style.transform = '';

      // Update button
      el.btnNext.disabled = true;
      el.btnNextLabel.textContent = 'Arrived!';
      el.btnNext.querySelector('.material-symbols-outlined').textContent = 'done';

      // Update reassurance
      el.reassuranceText.textContent = `You've arrived at Exit ${state.exit}!`;
      el.reassurancePill.querySelector('.material-symbols-outlined').textContent = 'celebration';
      el.reassurancePill.querySelector('.material-symbols-outlined').style.color = '#facc15';

      // Update progress
      el.progressFill.style.width = '100%';
      el.progressFill.style.background = 'var(--color-arrived)';
    }

    function goBack() {
      clearInterval(state.reassuranceTimer);
      stopCamera();

      state.screen = 'start';
      el.screenNav.classList.add('hidden');
      el.screenStart.classList.remove('hidden');

      // Reset nav arrow for next use
      el.arrowWrap.innerHTML = `
        <svg id="nav-arrow" class="nav-arrow" viewBox="0 0 80 100"
             xmlns="http://www.w3.org/2000/svg" aria-label="Direction arrow">
          <path d="M40 95 L40 30" stroke="white" stroke-width="9"
                stroke-linecap="round" fill="none"/>
          <polygon points="40,5 20,35 60,35" fill="white"/>
        </svg>`;
      el.btnNext.disabled = false;
      el.btnNextLabel.textContent = 'Next Step';
      el.btnNext.querySelector('.material-symbols-outlined').textContent = 'arrow_forward';
      el.progressFill.style.background = 'var(--color-primary)';
    }

    /* ─────────────────────────────────────────────
       UI Update
    ───────────────────────────────────────────── */
    function updateUI() {
      const steps = routes[state.exit];
      const step = steps[state.stepIndex];
      const total = steps.length;
      const pct = ((state.stepIndex + 1) / total * 100).toFixed(1);

      // Text fields
      el.instructionText.textContent = step.instruction;
      el.instructionHint.textContent = step.hint;
      el.stepIndicator.textContent   = `Step ${state.stepIndex + 1} of ${total}`;
      el.navDestText.textContent     = `Exit ${state.exit} — ${stations[state.station]}`;

      // Distance badge (hide on arrived)
      if (step.direction === 'arrived') {
        el.distanceBadge.style.opacity = '0';
      } else {
        el.distanceBadge.style.opacity = '1';
        el.distanceBadge.textContent   = `~${step.distance} to Exit ${state.exit}`;
      }

      // Progress bar
      el.progressFill.style.width = pct + '%';

      // Arrow direction — fade out, rotate, fade in
      if (step.direction !== 'arrived') {
        const targetDeg = directionDeg[step.direction];
        el.arrowWrap.classList.add('fading');
        setTimeout(() => {
          el.arrowWrap.style.transform = `rotate(${targetDeg}deg)`;
          el.arrowWrap.classList.toggle('arrow-straight', step.direction === 'straight');
          el.arrowWrap.classList.remove('fading');
          state.currentDeg = targetDeg;
        }, 160);
      }
    }

    /* ─────────────────────────────────────────────
       Mini Map Rendering
    ───────────────────────────────────────────── */
    const SVG_NS = 'http://www.w3.org/2000/svg';

    function svgEl(tag, attrs) {
      const el = document.createElementNS(SVG_NS, tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    function updateMiniMap() {
      const svg = el.minimap;
      while (svg.firstChild) svg.removeChild(svg.firstChild);

      // 1. Corridor lines
      corridors.forEach(([x1, y1, x2, y2]) => {
        svg.appendChild(svgEl('line', {
          x1, y1, x2, y2,
          stroke: 'rgba(255,255,255,0.2)',
          'stroke-width': '5',
          'stroke-linecap': 'round',
        }));
      });

      // 2. All exit markers (dimmed) + labels
      for (const [key, pt] of Object.entries(exitPoints)) {
        const isSelected = key === state.exit;
        const color = isSelected ? '#ff5252' : 'rgba(255,255,255,0.25)';

        // Diamond marker
        const size = isSelected ? 7 : 5;
        svg.appendChild(svgEl('polygon', {
          points: `${pt.x},${pt.y - size} ${pt.x + size},${pt.y} ${pt.x},${pt.y + size} ${pt.x - size},${pt.y}`,
          fill: color,
        }));

        // Label
        const lbl = exitLabels[key];
        const txt = svgEl('text', {
          x: lbl.x, y: lbl.y,
          fill: isSelected ? '#ff8a80' : 'rgba(255,255,255,0.35)',
          'font-size': isSelected ? '9' : '8',
          'font-family': 'system-ui, sans-serif',
          'font-weight': isSelected ? '700' : '400',
          'text-anchor': 'middle',
        });
        txt.textContent = key;
        svg.appendChild(txt);
      }

      // 3. Route highlight — dashed cyan polyline from start → current dot → exit
      const positions = dotPositions[state.exit];
      const exitPt    = exitPoints[state.exit];
      // Build points: all dot positions up to and including current, then exit
      const pathPts = positions.slice(0, state.stepIndex + 1).concat([exitPt]);
      const pointsStr = pathPts.map(p => `${p.x},${p.y}`).join(' ');

      svg.appendChild(svgEl('polyline', {
        points: pointsStr,
        stroke: '#00e5ff',
        'stroke-width': '2.5',
        'stroke-dasharray': '6 4',
        'stroke-linecap': 'round',
        fill: 'none',
        opacity: '0.85',
      }));

      // 4. Current position — pulse ring + solid dot
      const dot = positions[state.stepIndex];

      const pulse = svgEl('circle', {
        cx: dot.x, cy: dot.y, r: '6',
        fill: 'rgba(47,73,209,0.45)',
        class: 'map-pulse',
      });
      svg.appendChild(pulse);

      svg.appendChild(svgEl('circle', {
        cx: dot.x, cy: dot.y, r: '5',
        fill: '#2f49d1',
        stroke: 'white',
        'stroke-width': '1.5',
      }));

      // Start marker (center = 100,80)
      if (state.stepIndex === 0) {
        svg.appendChild(svgEl('circle', {
          cx: '100', cy: '80', r: '4',
          fill: 'rgba(255,255,255,0.5)',
          stroke: 'white',
          'stroke-width': '1',
        }));
      }
    }

    /* ─────────────────────────────────────────────
       Reassurance Cycle
    ───────────────────────────────────────────── */
    function startReassuranceCycle() {
      clearInterval(state.reassuranceTimer);
      state.reassuranceTimer = setInterval(cycleReassurance, 4000);
    }

    function cycleReassurance() {
      if (state.stepIndex >= routes[state.exit].length - 1) return;
      el.reassurancePill.classList.add('fading');
      setTimeout(() => {
        state.reassuranceIndex = (state.reassuranceIndex + 1) % reassuranceMessages.length;
        el.reassuranceText.textContent = reassuranceMessages[state.reassuranceIndex]();
        el.reassurancePill.classList.remove('fading');
      }, 320);
    }

    /* ─────────────────────────────────────────────
       Event Listeners
    ───────────────────────────────────────────── */
    el.stationSelect.addEventListener('change', e => {
      state.station = e.target.value;
    });

    el.exitGrid.addEventListener('click', e => {
      const btn = e.target.closest('.exit-pill');
      if (btn) selectExit(btn.dataset.exit);
    });

    el.btnStart.addEventListener('click', startNavigation);

    el.btnBack.addEventListener('click', goBack);

    el.btnNext.addEventListener('click', () => {
      if (el.btnNext.disabled) return;
      nextStep();
    });
  </script>
</body>
</html>
